<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MockMate AI - Interview Practice</title>
    <meta name="description" content="Master your next technical interview with MockMate AI. Practice realistic scenarios tailored to your target role with AI-driven mock sessions." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      // Configure Tailwind dark mode BEFORE any rendering
      tailwind.config = {
        darkMode: 'class',
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply theme class before first paint to prevent flash
      (function() {
        var stored = localStorage.getItem('mockmate-theme');
        if (stored === 'dark' || stored === 'light') {
          if (stored === 'dark') document.documentElement.classList.add('dark');
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
        // Light is default — no class needed
      })();
    </script>
  <link rel="stylesheet" href="/index.css">

{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react-router-dom": "https://esm.sh/react-router-dom@^6.22.3",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",

  }
}
</script>
</head>

  </body>
</html>
